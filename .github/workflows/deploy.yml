name: deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          (pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision || pip install torch torchvision)
          pip install -r requirements-server.txt

      - name: run tests
        run: python -m unittest -v test_server.py

  deploy:
    needs: test
    runs-on: self-hosted
    steps:
      - name: pull
        working-directory: /www/models-varroa-on-bee/
        run: git reset --hard && git pull

      - name: restart
        working-directory: /www/models-varroa-on-bee/
        run: chmod +x restart.sh && ./restart.sh
